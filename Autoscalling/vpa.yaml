apiVersion: autoscaling.k8s.io/v1 
kind: VerticalPodAutoscaler
metadata: 
  name: vpa-deployment
  labels: 
    app: myapp 
  namespace: autoscaling 
spec: 
  targetRef: 
    apiVersion: apps/v1 
    kind: Deployment 
    name: vpa-deployment
  updatePolicy:
   updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: application
      minAllowed:
        cpu: 100m
        memory: Mi
      maxAllowed:
        cpu: 1
        memory: 1Gi
