apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: my-deployment 
  labels: 
    stat: roll-up
spec: 
  replicas: 3 
  strategy: 
    type: RollingUpdate
    rollingUpdate: 
      maxSurge: 1
      maxUnavailable: 1
  selector: 
    matchLabels: 
      app: myapp 
  template: 
    metadata: 
      name: deploy-template 
      labels: 
        stat: roll-up
    spec: 
      containers: 
      - name: nginx-cont 
        image: nginx:latest 
        ports: 
        - name: nginx-port 
          containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: deployment-svc 
  labels: 
    stat: roll-up
spec: 
  type: NodePort 
  selector: 
    stat: roll-up
  ports: 
  - port: 80
    targetPort: 80