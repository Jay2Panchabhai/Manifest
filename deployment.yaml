apiVersion: app/v1
kind: Deployment
metadat:
  name: deploy-pod
  labels: 
    app: myapp
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: devlop-temp
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx-cont
        image: nginx:latest
        ports:
        - containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: recreate-svc
  labels: 
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80