apiVersion: v1
kind: ReplicaSet
metedata:
  name: my-rs
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    app: myapp
  template:
    metadata:
      name: my-rs-replics
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx-cont
        image: nginx
        ports:
        - name: app-port
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: rs-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector: 
    app: myapp
  ports:
  - port: 80
    targetPort: 80